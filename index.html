<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Futuro é Seu | O Código é Nosso</title>
    <style>
        /* CSS RESET E CONFIGURAÇÃO BÁSICA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fundo.png'); /* IMPORTANTE: Mantenha a imagem no mesmo diretório */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Mantém o layout focado no conteúdo */
        }

        /* SOBREPOSIÇÃO ESCURA PARA MELHORAR LEITURA */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Ajuste a opacidade aqui (0.1 a 0.9) */
            z-index: 1;
        }

        /* CONTÊINER PRINCIPAL TRANSPARENTE */
        .main-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
            background-color: rgba(20, 20, 20, 0.85); /* Vidro fosco */
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* ESTILIZAÇÃO DO PLAYER DE ÁUDIO CUSTOMIZADO */
        .audio-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(40, 40, 40, 0.7);
            border-radius: 10px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        button.control-btn {
            background: none;
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button.control-btn:hover {
            border-color: rgba(255, 255, 255, 0.9);
            color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .timeline-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"].timeline {
            flex-grow: 1;
            cursor: pointer;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"].timeline::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        input[type="range"].timeline::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .time-display {
            font-size: 0.9rem;
            opacity: 0.7;
            width: 45px;
            text-align: right;
        }

        /* ESTILIZAÇÃO DA ÁREA DO VÍDEO DO YOUTUBE */
        .video-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-placeholder {
            width: 100%;
            padding-top: 56.25%; /* Mantém proporção 16:9 */
            position: relative;
            background-color: rgba(40, 40, 40, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .video-placeholder p {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.6;
            width: 80%;
        }

        iframe.youtube-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input#youtube-url {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            outline: none;
        }

        button#load-video {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            background-color: #2c3e50; /* Cor sóbria */
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        button#load-video:hover {
            background-color: #34495e;
        }

    </style>
</head>
<body>

    <div class="main-container">

        <div class="audio-section">
            <audio id="main-audio" src="mapa.mp3"></audio>

            <div class="player-controls">
                <button class="control-btn" id="play-pause" title="Play">
                    ▶</button>
                
                <div class="timeline-container">
                    <input type="range" class="timeline" id="timeline" value="0" min="0" max="100">
                    <span class="time-display" id="current-time">0:00</span>
                </div>
            </div>
        </div>

        <div class="video-section">
            <div class="video-placeholder" id="video-container">
                <p>Cole um link do YouTube abaixo e clique em carregar.</p>
                </div>

            <div class="input-group">
                <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=NMNgbISmF4I">
                <button id="load-video">Carregar Vídeo</button>
            </div>
        </div>

    </div>

    <script>
        // --- JAVASCRIPT DO PLAYER DE ÁUDIO ---
        const audio = document.getElementById('main-audio');
        const playPauseBtn = document.getElementById('play-pause');
        const timeline = document.getElementById('timeline');
        const currentTimeDisplay = document.getElementById('current-time');

        // Alternar entre Play e Pause
        playPauseBtn.addEventListener('click', function() {
            if (audio.paused || audio.ended) {
                audio.play();
                playPauseBtn.textContent = '⏸'; // Ícone de Pause
                playPauseBtn.title = 'Pause';
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶'; // Ícone de Play
                playPauseBtn.title = 'Play';
            }
        });

        // Atualizar a linha do tempo e o tempo atual
        audio.addEventListener('timeupdate', function() {
            if (!isNaN(audio.duration)) {
                const percentage = (audio.currentTime / audio.duration) * 100;
                timeline.value = percentage;
                
                const minutes = Math.floor(audio.currentTime / 60);
                const seconds = Math.floor(audio.currentTime % 60);
                currentTimeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        });

        // Atualizar o tempo do áudio ao arrastar a linha do tempo
        timeline.addEventListener('input', function() {
            if (!isNaN(audio.duration)) {
                const time = (timeline.value * audio.duration) / 100;
                audio.currentTime = time;
            }
        });

        // Resetar ao terminar
        audio.addEventListener('ended', function() {
            playPauseBtn.textContent = '▶';
            timeline.value = 0;
            currentTimeDisplay.textContent = '0:00';
        });


        // --- JAVASCRIPT DO VÍDEO DO YOUTUBE ---
        const urlInput = document.getElementById('youtube-url');
        const loadBtn = document.getElementById('load-video');
        const videoContainer = document.getElementById('video-container');

        function extrairIdDoYoutube(url) {
            // RegEx para extrair o ID do vídeo de várias formas de URL do YouTube
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        function carregarVideo() {
            const url = urlInput.value;
            const videoId = extrairIdDoYoutube(url);

            if (videoId) {
                videoContainer.innerHTML = ''; // Limpa o placeholder
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/watch?v=NMNgbISmF4I`;
                iframe.classList.add('youtube-video');
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;
                videoContainer.appendChild(iframe);
            } else {
                alert('URL do YouTube inválida! Verifique se copiou o link corretamente.');
                urlInput.focus();
            }
        }

        loadBtn.addEventListener('click', carregarVideo);
        
        // Carregar vídeo ao pressionar Enter no input
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                carregarVideo();
            }
        });

    </script>
</body>
</html>
