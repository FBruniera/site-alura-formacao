<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Futuro é Seu | Playlist Fixa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Certifique-se de que o nome da imagem abaixo seja o mesmo do seu arquivo */
            background-image: url('fundo.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
            background-color: rgba(15, 15, 15, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
        }

        /* PLAYER DE ÁUDIO */
        .audio-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: white;
            border: none;
            color: black;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timeline {
            flex-grow: 1;
            cursor: pointer;
        }

        /* VÍDEO FIXO */
        .video-section {
            width: 100%;
        }

        .video-wrapper {
            position: relative;
            padding-top: 56.25%; /* 16:9 */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="audio-section">
            <h3 style="margin-bottom: 15px; font-weight: 300;">Audio Track</h3>
            <audio id="main-audio" src="mapa.mp3"></audio>
            <div class="player-controls">
                <button class="control-btn" id="play-pause">▶</button>
                <input type="range" id="timeline" class="timeline" value="0" min="0" max="100">
            </div>
        </div>

        <div class="video-section">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/watch?v=lv_YdVKvbZs" allowfullscreen></iframe>
            </div>
        </div>

    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const playPauseBtn = document.getElementById('play-pause');
        const timeline = document.getElementById('timeline');

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '⏸';
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            timeline.value = pct ? pct : 0;
        });

        timeline.addEventListener('input', () => {
            audio.currentTime = (timeline.value * audio.duration) / 100;
        });
    </script>
</body>
</html>
